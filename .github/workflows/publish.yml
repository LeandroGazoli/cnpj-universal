name: Build and Publish to NPM

on:
  push:
    branches:
      - main
      - master

jobs:
  publish:
    runs-on: ubuntu-latest

    # Necessário para o GitHub Actions ter permissão de criar tags/releases no repo
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessário para o semantic-release analisar o histórico de commits

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x" # semantic-release@25 requer Node 22+
          registry-url: "https://registry.npmjs.org"

      - name: Instalar dependências
        run: npm ci

      - name: Build do projeto (gera a pasta dist)
        run: npm run build

      - name: Versionar e Publicar (Semantic Release)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Padrão do GitHub Actions
        run: npx semantic-release
